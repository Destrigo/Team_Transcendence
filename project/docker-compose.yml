version: '3.8'
 
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-papertrade}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-papertrade_secret}
      POSTGRES_DB: ${DB_NAME:-papertrade}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-papertrade}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
 
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-papertrade}:${DB_PASSWORD:-papertrade_secret}@db:5432/${DB_NAME:-papertrade}?schema=public
    ports:
      - "4000:4000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    command: >
      sh -c "
        npx prisma generate &&
        npx prisma migrate deploy &&
        (npx prisma db seed || true) &&
        npm run start:dev
      "
    restart: unless-stopped
 
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    environment:
      VITE_API_URL: http://localhost:4000
      VITE_WS_URL: http://localhost:4000
    restart: unless-stopped
 
volumes:
  pgdata: