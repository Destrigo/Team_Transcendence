<style>
#trade { min-height: 200px; }
#trade svg { max-width: 100%; height: auto; }
</style>
<div id="trade"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  flowchart: { curve: 'basis', padding: 16, nodeSpacing: 24, rankSpacing: 44 },
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    primaryColor: dark ? '#085041' : '#E1F5EE',
    primaryTextColor: dark ? '#9FE1CB' : '#04342C',
    primaryBorderColor: dark ? '#5DCAA5' : '#0F6E56',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('trade-svg', `flowchart TD
    User["User clicks Buy / Sell"] --> Validate{"Validate input"}
    Validate -->|Invalid| Error["Show error\nInsufficient funds / bad input"]
    Validate -->|Valid| OrderType{"Order type?"}

    OrderType -->|Market| ExecNow["Execute immediately\nat current price"]
    OrderType -->|Limit| StorePending["Store as pending\nwith target price"]

    ExecNow --> Transaction["DB transaction"]
    Transaction --> DeductBalance["Deduct balance\nor deduct holdings"]
    DeductBalance --> UpdateHoldings["Update holdings\nrecalculate avg price"]
    UpdateHoldings --> CreateOrder["Save order\nstatus: filled"]
    CreateOrder --> Notify["Push notification\nOrder filled!"]
    Notify --> UpdatePortfolio["Recalculate\nportfolio value"]
    UpdatePortfolio --> WSPush["WebSocket push\nto user's frontend"]

    StorePending --> PriceCheck{"Price checker\nevery 30s"}
    PriceCheck -->|Price not reached| PriceCheck
    PriceCheck -->|Price matches| CheckBalance{"Still has\nfunds?"}
    CheckBalance -->|No| CancelOrder["Cancel order\nnotify user"]
    CheckBalance -->|Yes| ExecNow

    style User fill:${dark?'#3C3489':'#EEEDFE'},stroke:${dark?'#AFA9EC':'#534AB7'}
    style Error fill:${dark?'#791F1F':'#FCEBEB'},stroke:${dark?'#F09595':'#A32D2D'}
    style CancelOrder fill:${dark?'#791F1F':'#FCEBEB'},stroke:${dark?'#F09595':'#A32D2D'}
    style ExecNow fill:${dark?'#085041':'#E1F5EE'},stroke:${dark?'#5DCAA5':'#0F6E56'}
    style Transaction fill:${dark?'#085041':'#E1F5EE'},stroke:${dark?'#5DCAA5':'#0F6E56'}
    style DeductBalance fill:${dark?'#085041':'#E1F5EE'},stroke:${dark?'#5DCAA5':'#0F6E56'}
    style UpdateHoldings fill:${dark?'#085041':'#E1F5EE'},stroke:${dark?'#5DCAA5':'#0F6E56'}
    style CreateOrder fill:${dark?'#085041':'#E1F5EE'},stroke:${dark?'#5DCAA5':'#0F6E56'}
    style Notify fill:${dark?'#633806':'#FAEEDA'},stroke:${dark?'#EF9F27':'#854F0B'}
    style UpdatePortfolio fill:${dark?'#633806':'#FAEEDA'},stroke:${dark?'#EF9F27':'#854F0B'}
    style WSPush fill:${dark?'#633806':'#FAEEDA'},stroke:${dark?'#EF9F27':'#854F0B'}
    style StorePending fill:${dark?'#0C447C':'#E6F1FB'},stroke:${dark?'#85B7EB':'#185FA5'}
    style PriceCheck fill:${dark?'#0C447C':'#E6F1FB'},stroke:${dark?'#85B7EB':'#185FA5'}
`);
document.getElementById('trade').innerHTML = svg;
document.querySelectorAll('#trade .node path').forEach(p => {
  const d = p.getAttribute('d');
  if (!d) return;
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = nums.filter((_,i) => i%2===0), ys = nums.filter((_,i) => i%2===1);
  const x=Math.min(...xs), y=Math.min(...ys), w=Math.max(...xs)-x, h=Math.max(...ys)-y;
  if (w < 10 || h < 10) return;
  const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x',x); rect.setAttribute('y',y);
  rect.setAttribute('width',w); rect.setAttribute('height',h);
  rect.setAttribute('rx','8');
  for (const a of ['fill','stroke','stroke-width','class','style'])
    if (p.hasAttribute(a)) rect.setAttribute(a, p.getAttribute(a));
  p.replaceWith(rect);
});
</script>
